    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>Solomon's Temple — Documentary | Beit HaMikdash</title>
    <meta
      name="description"
      content="A documentary journey into Solomon's Temple — its architecture, sacred objects, its destruction, and the enduring Jewish hope for its restoration."
    />

    <meta property="og:title" content="Solomon's Temple — Documentary" />
    <meta
      property="og:description"
      content="From the gold of the First Temple to the light of the Third — a documentary on the Beit HaMikdash, its history, and its legacy."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://solomon-temple.com/" />
    <meta property="og:image" content="https://solomon-temple.com/images/hero.jpg" />

    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="he_IL" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Solomon's Temple — Documentary" />

      name="twitter:description"
      content="From the gold of the First Temple to the light of the Third — a documentary on the Beit HaMikdash."
    />

  </head>

  <body>
    <!-- Sync <html lang> + dir with i18next-detected language (en | de | he) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('i18nextLng');
          var raw = stored || (navigator.language || 'en');
          var lang = (raw || 'en').slice(0, 2).toLowerCase();
          if (lang !== 'de' && lang !== 'he') lang = 'en';
          document.documentElement.lang = lang;
          document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
        } catch (e) {}
      })();
    </script>
    <!-- SPA redirect handler for GitHub Pages 404 -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
